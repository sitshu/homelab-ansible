---
# NTFS paths (/mnt/c, /mnt/d, /mnt/e) don't support Linux chmod via WSL's 9P.
# ext4 paths (under /home) do. Split tasks accordingly.

- name: Ensure NTFS-mounted host dirs exist (no mode — 9P can't chmod)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ paths.media_root }}"
    - "{{ paths.media_root }}/movies"
    - "{{ paths.media_root }}/tv"
    - "{{ paths.media_root }}/music"
    - "{{ paths.media_root }}/marathi"
    - "{{ paths.media_root }}/audiobooks"
    - "{{ paths.media_root }}/study"
    - "{{ paths.media_root }}/photos"
    - "{{ paths.downloads_root }}"
    - "{{ paths.downloads_root }}/incomplete"
    - "{{ paths.downloads_root }}/complete"
    - "{{ paths.downloads_root }}/complete/movies"
    - "{{ paths.downloads_root }}/complete/tv"
    - "{{ paths.downloads_root }}/complete/music"
    - "{{ paths.backup_root }}"

- name: Ensure ext4-backed host dirs exist (with proper mode)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ paths.docker_data }}"
    - "{{ paths.photos_root }}"

- name: Ensure per-service config directories exist
  ansible.builtin.file:
    path: "{{ paths.docker_data }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - gluetun
    - gluetun/auth
    - qbittorrent
    - prowlarr
    - sonarr
    - radarr
    - bazarr
    - plex
    - immich
    - nextcloud
    - nextcloud/redis
    - cloudflared
    - restic

- name: Create shared Docker network
  community.docker.docker_network:
    name: "{{ docker_network }}"
    state: present
    driver: bridge