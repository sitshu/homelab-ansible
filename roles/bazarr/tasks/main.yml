---
- name: Deploy Bazarr (Subtitles)
  community.docker.docker_container:
    name: bazarr
    image: "lscr.io/linuxserver/bazarr:{{ versions.bazarr }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network }}"
    env:
      PUID: "{{ puid }}"
      PGID: "{{ pgid }}"
      TZ: "{{ timezone }}"
    ports:
      - "{{ ports.bazarr }}:6767"
    volumes:
      - "{{ paths.docker_data }}/bazarr:/config"
      - "{{ paths.media_root }}:/media"
