---
- name: Deploy Plex (with Intel iGPU hardware transcoding)
  community.docker.docker_container:
    name: plex
    image: "lscr.io/linuxserver/plex:{{ versions.plex }}"
    state: started
    restart_policy: unless-stopped
    # Plex needs host networking for GDM discovery (LAN clients find server)
    network_mode: host
    # Intel iGPU passthrough for HW transcoding (Plex Pass)
    devices:
      - "/dev/dri:/dev/dri"
    env:
      PUID: "{{ puid }}"
      PGID: "{{ pgid }}"
      TZ: "{{ timezone }}"
      VERSION: "docker"
      PLEX_CLAIM: "{{ vault_plex_claim | default('') }}"
    volumes:
      - "{{ paths.docker_data }}/plex:/config"
      - "{{ paths.media_root }}:/media:ro"    # Plex reads media, doesn't write
      # Transcode on tmpfs in RAM for speed (i7-10700K has 16+GB)
      # Using bind mount for simplicity; consider tmpfs for extra perf
