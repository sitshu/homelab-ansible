---
- name: Deploy Plex (with NVIDIA NVENC hardware transcoding)
  community.docker.docker_container:
    name: plex
    image: "plexinc/pms-docker:plexpass"
    state: started
    restart_policy: unless-stopped
    network_mode: host
    device_requests:
      - driver: nvidia
        count: -1
        capabilities:
          - ["gpu", "compute", "video", "utility"]
    env:
      PUID: "{{ puid | string }}"
      PGID: "{{ pgid | string }}"
      TZ: "{{ timezone }}"
      VERSION: docker
      PLEX_CLAIM: "{{ vault_plex_claim | default('') }}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    volumes:
      - "{{ paths.docker_data }}/plex:/config"
      - "{{ paths.media_root }}:/data/media:ro"
      - "{{ paths.docker_data }}/plex/transcode:/transcode"