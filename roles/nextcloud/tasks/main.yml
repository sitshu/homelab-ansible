---
- name: Render Nextcloud docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ paths.docker_data }}/nextcloud/docker-compose.yml"
    mode: "0640"

- name: Deploy Nextcloud stack
  community.docker.docker_compose_v2:
    project_src: "{{ paths.docker_data }}/nextcloud"
    state: present
    pull: policy
